---
# create_proxmox_vm.yml
- name: envio de reporte
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars/proxmox.yaml

  collections:
    - community.general
    - community.proxmox

  vars:
    api_host_url: "https://{{ proxmox_api_host }}:8006/api2/json"
    vm_id: null
    vm_new_id: null

    proxmox_auth: &proxmox_auth
      api_host: "{{ proxmox_api_host }}"
      api_user: "{{ proxmox_api_user }}"
      api_token_id: "{{ proxmox_api_token_id | default(omit) }}"
      api_token_secret: "{{ proxmox_api_token_secret | default(omit) }}"
      validate_certs: false

  tasks:

    - name: Validar credenciales (token o password)
      assert:
        that:
          - (proxmox_api_token_id is defined and proxmox_api_token_secret is defined) or (proxmox_api_password is defined)
        fail_msg: "Debes definir token (ID y Secret) o password para la API de Proxmox."


    - name: Obtener nodos Proxmox
      uri:
        url: "{{ api_host_url }}/nodes"
        method: GET
        headers:
          Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"  
        validate_certs: false
      register: proxmox_nodes

    - name: Obtener VMs por nodo
      uri:
        url: "{{ api_host_url }}/nodes/{{ item.node }}/qemu"
        method: GET
        headers:
          Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"  
        validate_certs: false
      loop: "{{ proxmox_nodes.json.data }}"
      register: vm_summary

    - name: Obtener config de cada VM (incluye ctime)
      uri:
        url: "{{ api_host_url }}/nodes/{{ item.0.item.node }}/qemu/{{ item.1.vmid }}/config"
        method: GET
        headers:
          Authorization: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"  
        validate_certs: false
      loop: "{{ vm_summary.results | subelements('json.data') }}"
      register: vm_config

    - name: Construir reporte de VMs
      set_fact:
        reporte_vms: "{{ reporte_vms | default([]) + [ {
          'node': item.0.item.node,
          'vmid': item.1.vmid,
          'name': item.1.name,
          'status': item.1.status | default('unknown'),
          'cpus': item.1.cores | default(0),
          'ram_mb': (item.1.memory | default(0)),
          'disk_gb': (item.1.scsi0.split(':')[1].split('=')[1].rstrip('G') | default('0')),
          'created_at': (item.1.ctime | int | to_datetime('%s'))
          } ] }}"
      loop: "{{ vm_config.results | zip(vm_summary.results | subelements('json.data')) }}"

    - debug:
        msg: |
          VM {{ item.vmid }} ({{ item.name }})
          Nodo: {{ item.node }}
          Estado: {{ item.status }}
          CPUs: {{ item.cpus }}
          RAM: {{ item.ram_mb }} MB
          Creada: {{ item.created_at }}
      loop: "{{ reporte_vms }}"

    - copy:
        dest: /tmp/reporte_proxmox.csv
        content: |
          node,vmid,name,status,cpus,ram_mb,disk_gb
          {% for vm in reporte_vms %}
          {{ vm.node }},{{ vm.vmid }},{{ vm.name }},{{ vm.status }},{{ vm.cpus }},{{ vm.ram_mb }},{{ vm.disk_gb }}
          {% endfor %}

