---
# create_proxmox_vm.yml
- name: Agregar disco a Proxmox VM
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars/proxmox.yaml


  vars:
    api_host_url: "https://{{ proxmox_api_host }}:8006/api2/json"

    proxmox_auth: &proxmox_auth
      api_host: "{{ proxmox_api_host }}"
      api_user: "{{ proxmox_api_user }}"
      api_token_id: "{{ proxmox_api_token_id | default(omit) }}"
      api_token_secret: "{{ proxmox_api_token_secret | default(omit) }}"
      validate_certs: false

  tasks:
    - name: Validar credenciales (token o password)
      assert:
        that:
          - (proxmox_api_token_id is defined and proxmox_api_token_secret is defined) or (proxmox_api_password is defined)
        fail_msg: "Debes definir token (ID y Secret) o password para la API de Proxmox."

    - name: Get VM configuration from Proxmox
      community.proxmox.proxmox_vm_info:        
        <<: *proxmox_auth
        node: "{{ proxmox_node }}"  
        name: "{{ vm_name | default(omit) }}"
        vmid: "{{ vm_id }}"
        type: qemu
        config: current 
      register: vm_info_result   
      # Delegate to localhost because the proxmox modules run via the API
      delegate_to: localhost

    
    - name: Show VM status
      ansible.builtin.debug:
        msg: "Current VM status is {{ vm_info_result.proxmox_vms[0].config }}"
      when: vm_info_result.proxmox_vms | length > 0

    # - name: apagar la VM
    #   community.proxmox.proxmox_kvm:
    #     <<: *proxmox_auth
    #     node: "{{ proxmox_node | default('proxmox03') }}"
    #     vmid: "{{ vm_id }}"
    #     state: stopped
    #     force: false
    #   when: vm_info_result.proxmox_vms | length > 0 
    #   register: stop_task_result 

    - name: Agregar nuevo disco a la VM
      community.proxmox.proxmox_kvm:
        <<: *proxmox_auth
        node: "{{ proxmox_node | default('proxmox03') }}"
        vmid: "{{ vm_id }}"
        scsihw: "virtio-scsi-single"
            - name: "disk1"
              scsi1: "{{ vm_storage }}:{{ vm_disk_gb }}"
        #scsi1: "{{ vm_storage }}:{{ vm_disk_gb }}"
        #scsi2: "{{ vm_storage }}:{{ vm_disk_gb }}"
        #scsi3: "{{ vm_storage }}:{{ vm_disk_gb }}"
        #scsi4: "{{ vm_storage }}:{{ vm_disk_gb }}"
        #scsi5: "{{ vm_storage }}:{{ vm_disk_gb }}"
        #scsi6: "{{ vm_storage }}:{{ vm_disk_gb }}"
        #scsi7: "{{ vm_storage }}:{{ vm_disk_gb }}"
        #scsi8: "{{ vm_storage }}:{{ vm_disk_gb }}"
        scsi1: "{{ vm_storage }}:{{ vm_disk_gb }}"
        state: present

    # - name: Mostrar resultado final
    #   debug:
    #     msg:
    #       - "VM {{ vm_name }} (ID {{ vm_id }}) creada y encendida en {{ proxmox_node }}"
    #       - "IP detectada: {{ vm_ip | default('no disponible') }}"