---
# vars/proxmox.yml
proxmox_api_host: "10.10.201.2"   # o IP del nodo/cluster
proxmox_api_user: "root@pam"                  # o usuario@realm
proxmox_api_token_id: "ansible"               # nombre del token (si usas API token)
proxmox_api_token_secret: "8b36c67b-bb4c-4598-a638-d9809eddd9b7" # "4332aafa-3336-4e46-bf78-b443d5ad4f42" # secreto del token (si usas API token)

# vars/proxmox.yml
proxmoxc_api_host: "10.10.201.2"   # o IP del nodo/cluster
proxmoxc_api_user: "root@pam"                  # o usuario@realm
proxmoxc_api_token_id: "ansible"               # nombre del token (si usas API token)
proxmoxc_api_token_secret: "93aa302b-aff8-4e54-9f59-0561ab254dcd" # secreto del token (si usas API token)

# Si prefieres password en lugar de token, usa:
# proxmox_api_password: "tu_password"

proxmox_node: "proxmox03"               # nombre del nodo destino (p.ej. pve1)
vm_id: 210                        # ID único de VM en Proxmox
vm_name: "vm-ansible-demo"
vm_cores: 2
vm_sockets: 1
vm_memory_mb: "4096"
vm_disk_gb: "40"
vm_bridge: "vmbr0"
vm_vlan: "3012"                       # opcional, si no usas VLAN, quítalo
vm_storage: "local-zfs"           # storage para el disco
vm_iso_storage: "Storage-LVM-01"           # storage donde vive la ISO
vm_iso_file: "iso/ubuntu-22.04.4-live-server-amd64.iso" # ruta relativa al storage
vm_nic_model: null                 # opcional: asignar MAC address específico o modelo de NIC (p.ej. virtio, e1000)
vm_description: "Creada por Ansible"
vm_state : "started"                   # "started", "stopped", o "present" (solo crear sin encender) restarted

# Para cloud-init:
use_cloud_init: true
ci_storage: "Storage-LVM-01"           # dónde va el disco CI si aplica (o "local")
ci_user: "administrador"
ci_password: "N0ti3n3"                   # si prefieres password; si usas SSH key, puedes dejarlo vacío
#ci_ssh_authorized_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAI.... tu_llave_pub"
ci_ip_config: "10.10.212.0/24"              # "dhcp" o "ip=192.168.1.50/24,gw=192.168.1.1"
ci_dns_servers: "8.8.8.8"
ci_dns_domain: "lab.local"

# Plantilla (opcional, en vez de ISO). Si la usas, pon vm_from_template: true
vm_from_template: true
vm_template_name: "WS2022"  # nombre exacto de la plantilla si aplica 

# Valores para coneccion a VSPOne (usado en HitachiSnapshot.yaml)
vspone_api_host: "10.10.200.40"
vspone_api_user: "ansible"
vspone_api_password: "Ansible123_"

vsp_primary_volume_id: [ 0 ]
vsp_secundary_volume_id: 11
vsp_pool_id: "0" 
vsp_snapshot_group_name: "ansible_test_group"


# Hitachi Vantara VSP One Block Storage Modules use REST API to communicate with the storage.
# For the storage_address and secondary_storage_address fields use the IP address or FQDN of the REST API server of the corresponding storage.
# For system configuration of the REST API for different Hitachi Storage Models, please refer to the following link:
# https://docs.hitachivantara.com/r/en-us/virtual-storage-platform-g130-g/f350-g/f370-g/f700-g/f900/93-07-2x/mk-23vsp1b003/overview-of-the-rest-api

storage_serial: "840922" #<your_storage_serial_number>"" # Example: 810018 Not required for VSP One SDS Block
storage_address: "10.10.200.40"              # Example: storage1.company.com or sds1.company.com or 10.10.10.10. For VSP One SDS Block, this can be cluster address or master node address
vault_storage_username: "ansible"
vault_storage_secret: "Ansible123_"

secondary_storage_serial: "840240"  #<your_secondary_storage_serial_number>""
secondary_storage_address: "10.10.200.43" # Example: storage1.company.com or sds1.company.com or 10.10.10.10
vault_secondary_storage_username: "ansible"
vault_secondary_storage_secret: "Ansible123_"



