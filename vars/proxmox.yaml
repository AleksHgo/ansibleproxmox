---
# vars/proxmox.yml
proxmox_api_host: "10.10.201.2"   # o IP del nodo/cluster
proxmox_api_user: "root@pam"                  # o usuario@realm
proxmox_api_token_id: "ansible"               # nombre del token (si usas API token)
proxmox_api_token_secret: "8b36c67b-bb4c-4598-a638-d9809eddd9b7" # secreto del token (si usas API token)

# Si prefieres password en lugar de token, usa:
# proxmox_api_password: "tu_password"

proxmox_node: "proxmox01"               # nombre del nodo destino (p.ej. pve1)
vm_id: 210                        # ID único de VM en Proxmox
vm_name: "vm-ansible-demo"
vm_cores: "2"
vm_memory_mb: "4096"
vm_disk_gb: "40"
vm_bridge: "vmbr0"
vm_vlan: "3012"                       # opcional, si no usas VLAN, quítalo
vm_storage: "local-zfs"           # storage para el disco
vm_iso_storage: "Storage-LVM-01"           # storage donde vive la ISO
vm_iso_file: "iso/ubuntu-22.04.4-live-server-amd64.iso" # ruta relativa al storage
vm_nic_model: null                 # opcional: asignar MAC address específico o modelo de NIC (p.ej. virtio, e1000)
vm_description: "Creada por Ansible"
vm_state : "started"                   # "started", "stopped", o "present" (solo crear sin encender) restarted

# Para cloud-init:
use_cloud_init: true
ci_storage: "Storage-LVM-01"           # dónde va el disco CI si aplica (o "local")
ci_user: "administrador"
ci_password: "N0ti3n3"                   # si prefieres password; si usas SSH key, puedes dejarlo vacío
#ci_ssh_authorized_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAI.... tu_llave_pub"
ci_ip_config: "10.10.212.0/24"              # "dhcp" o "ip=192.168.1.50/24,gw=192.168.1.1"
ci_dns_servers: "8.8.8.8"
ci_dns_domain: "lab.local"

# Plantilla (opcional, en vez de ISO). Si la usas, pon vm_from_template: true
vm_from_template: true
vm_template_name: "WS2022"  # nombre exacto de la plantilla si aplica 

# Valores para coneccion a VSPOne (usado en HitachiSnapshot.yaml)
vspone_api_host: "10.10.200.40"
vspone_api_user: "ansible"
vspone_api_password: "Ansible123_"