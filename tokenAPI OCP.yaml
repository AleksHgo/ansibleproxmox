---
- name: Obtener token de autenticación de OpenShift
  hosts: localhost
  gather_facts: no
  vars:
    openshift_api_url: "https://api.icsiocp.icsicorp.com.mx:6443"
    openshift_user: "kubeadmin"
    openshift_password: "DE5Ld-MZpxh-p9qmA-7QHvp"
  tasks:

    - name: Authenticate to OpenShift cluster and gell a list of all pods from any namespace
      block:
        # It's good practice to store login credentials in a secure vault and not
        # directly in playbooks.
        - name: Include 'openshift_passwords.yml'
          ansible.builtin.include_vars: openshift_passwords.yml

        - name: Log in (obtain access token)
          community.okd.openshift_auth:
            host: "{{ openshift_api_url }}"
            username: "{{ openshift_user }}"
            password: "{{ oopenshift_password }}"
            validate_certs: false
          register: openshift_auth_results
          no_log: true

        - name: Mostrar token
          debug:
            msg: "Token de OpenShift: {{ auth_result.openshift_auth.api_key }}"
            
