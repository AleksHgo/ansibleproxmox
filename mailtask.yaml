

- name: Enviar correo HTML vía Office 365
  community.general.mail:
    host: "{{ smtp_host }}"
    port: "{{ smtp_port }}"
    username: "{{ smtp_user }}"
    password: "{{ smtp_password }}"
    to: "{{ mail_to }}"
    from: "{{ mail_from }}"
    subject: "{{ mail_subject }}"
    body: "{{ mail_body_html }}"
    subtype: html
    secure: starttls
  delegate_to: localhost
